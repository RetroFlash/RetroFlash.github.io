<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroFlash | Arcade Archive</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #c084fc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo-text {
            font-family: 'Lexend', sans-serif;
            font-size: 1.6rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Nuevo Buscador */
        .search-bar {
            flex: 1;
            max-width: 400px;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
        }

        main {
            flex: 1;
            padding: 2rem 8%;
        }

        /* Nuevos Filtros */
        .filters-container {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .filter-btn:hover {
            border-color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-info { padding: 1rem; }
        .card-info h3 { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag {
            background: rgba(129, 140, 248, 0.1);
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #game-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98); z-index: 2000; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #ruffle-player { width: 90%; max-width: 1000px; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; }
        .close-overlay { position: absolute; top: 20px; right: 30px; color: white; font-size: 3rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo-text">RETROFLASH</div>
    <input type="text" id="search-input" class="search-bar" placeholder="Buscar juego...">
</header>

<main>
    <div class="filters-container" id="filters">
        </div>
    
    <div class="grid" id="game-grid">
        </div>
</main>

<div id="game-overlay">
    <span class="close-overlay" onclick="closeGame()">&times;</span>
    <div id="ruffle-player"></div>
</div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
    let allGames = [];
    let currentFilter = 'Todos';

    const gameGrid = document.getElementById('game-grid');
    const filtersContainer = document.getElementById('filters');
    const searchInput = document.getElementById('search-input');
    const overlay = document.getElementById('game-overlay');
    const playerContainer = document.getElementById('ruffle-player');

    // 1. Cargar datos
    fetch('games.json')
        .then(response => response.json())
        .then(games => {
            allGames = games;
            generarFiltros();
            renderizarJuegos();
        });

    // 2. Extraer categorías únicas y crear botones
    function generarFiltros() {
        const categorias = new Set(['Todos']); // 'Todos' siempre está
        allGames.forEach(game => game.tags.forEach(tag => categorias.add(tag)));

        categorias.forEach(categoria => {
            const btn = document.createElement('button');
            btn.className = `filter-btn ${categoria === 'Todos' ? 'active' : ''}`;
            btn.innerText = categoria;
            btn.onclick = () => {
                // Quitar clase active de todos y ponérsela al pulsado
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentFilter = categoria;
                renderizarJuegos();
            };
            filtersContainer.appendChild(btn);
        });
    }

    // 3. Pintar los juegos según buscador y filtros
    function renderizarJuegos() {
        gameGrid.innerHTML = '';
        const textoBusqueda = searchInput.value.toLowerCase();

        const juegosFiltrados = allGames.filter(game => {
            const coincideFiltro = currentFilter === 'Todos' || game.tags.includes(currentFilter);
            const coincideBusqueda = game.name.toLowerCase().includes(textoBusqueda);
            return coincideFiltro && coincideBusqueda;
        });

        juegosFiltrados.forEach(game => {
            const card = document.createElement('div');
            card.className = 'card';
            const tagsHTML = game.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            
            card.innerHTML = `
                <img src="${game.image}" alt="${game.name}">
                <div class="card-info">
                    <h3>${game.name}</h3>
                    <div class="tag-container">${tagsHTML}</div>
                </div>
            `;
            card.onclick = () => launchGame(game.file);
            gameGrid.appendChild(card);
        });
    }

    // Evento del buscador para que filtre mientras escribes
    searchInput.addEventListener('input', renderizarJuegos);

    // Funciones del Emulador
    function launchGame(swfFile) {
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        
        // ¡Magia aquí! Configuramos el emulador antes de cargar el juego
        player.config = {
            letterbox: "on",      // Centra el juego y pone bandas negras si no encaja
            forceScale: true,     // Fuerza a que ocupe el máximo espacio posible
            autoplay: "on",       // Salta la pantalla de "Click to play"
            unmuteOverlay: "hidden" // Oculta el aviso de sonido
        };

        playerContainer.innerHTML = '';
        playerContainer.appendChild(player);
        player.load({ url: swfFile, allowScriptAccess: true });
    }

    function closeGame() {
        overlay.style.display = 'none';
        document.body.style.overflow = 'auto';
        playerContainer.innerHTML = '';
    }
</script>

</body>
</html>
